apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "chat-app.fullname" . }}-service
  labels:
    app: {{ include "chat-app.fullname" . }}-service
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "chat-app.fullname" . }}-service
  template:
    metadata:
      labels:
        app: {{ include "chat-app.fullname" . }}-service
    spec:
      containers:
        - name: chat-service
          image: "{{ .Values.registry }}/{{ .Values.chatService.image.repository }}:{{ .Values.chatService.image.tag }}"
          imagePullPolicy: {{ .Values.chatService.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.chatService.service.port }}
          env:
            - name: PORT
              value: "{{ .Values.chatService.service.port }}"
            - name: DB_URL
              value: "jdbc:postgresql://{{ .Values.postgresql.host }}:{{ .Values.postgresql.port }}/{{ .Values.postgresql.database }}"
            - name: DB_USER
              value: {{ .Values.postgresql.username | quote }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "chat-app.fullname" . }}-secrets
                  key: db-password
            - name: REDIS_HOST
              value: {{ .Values.redis.host | quote }}
            - name: REDIS_PORT
              value: "{{ .Values.redis.port }}"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "chat-app.fullname" . }}-secrets
                  key: redis-password
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "chat-app.fullname" . }}-secrets
                  key: jwt-secret
            - name: JWT_EXPIRATION_MS
              value: "{{ .Values.chatService.env.JWT_EXPIRATION_MS }}"
          resources:
            {{- toYaml .Values.chatService.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: {{ .Values.chatService.service.port }}
            initialDelaySeconds: 480
            periodSeconds: 30
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: {{ .Values.chatService.service.port }}
            initialDelaySeconds: 420
            periodSeconds: 10
            failureThreshold: 10
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "chat-app.fullname" . }}-service
spec:
  selector:
    app: {{ include "chat-app.fullname" . }}-service
  ports:
    - port: {{ .Values.chatService.service.port }}
      targetPort: {{ .Values.chatService.service.port }}