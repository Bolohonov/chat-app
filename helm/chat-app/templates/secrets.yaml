{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "chat-app.fullname" . }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: {{ include "chat-app.fullname" . }}-gateway
                port:
                  number: {{ .Values.gateway.service.port }}
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "chat-app.fullname" . }}-service
                port:
                  number: {{ .Values.chatService.service.port }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "chat-app.fullname" . }}-frontend
                port:
                  number: 80
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
{{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "chat-app.fullname" . }}-secrets
type: Opaque
stringData:
  db-password: {{ .Values.postgresql.password | quote }}
  jwt-secret: {{ .Values.chatService.env.JWT_SECRET | quote }}
  redis-password: {{ .Values.redis.password | quote }}