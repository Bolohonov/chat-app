{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "chat-app.fullname" . }}
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    # WebSocket upgrade support
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
#    nginx.ingress.kubernetes.io/configuration-snippet: |
#      proxy_set_header Upgrade $http_upgrade;
#      proxy_set_header Connection "upgrade";
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          # WebSocket path → Go gateway
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: {{ include "chat-app.fullname" . }}-gateway
                port:
                  number: {{ .Values.gateway.service.port }}
          # REST API → Java service
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "chat-app.fullname" . }}-service
                port:
                  number: {{ .Values.chatService.service.port }}
          # Frontend → Nginx SPA
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "chat-app.fullname" . }}-frontend
                port:
                  number: 80
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
{{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "chat-app.fullname" . }}-secrets
type: Opaque
stringData:
  db-password: {{ .Values.postgresql.auth.password | quote }}
  jwt-secret: {{ .Values.chatService.env.JWT_SECRET | quote }}
