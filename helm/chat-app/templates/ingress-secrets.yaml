{{- if .Values.ingress.enabled }}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ include "chat-app.fullname" . }}
  namespace: {{ .Release.Namespace }}
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`{{ .Values.ingress.host }}`) && PathPrefix(`{{ .Values.ingress.basePath }}/api`)
      kind: Rule
      middlewares:
        - name: {{ include "chat-app.fullname" . }}-strip
      services:
        - name: {{ include "chat-app.fullname" . }}-service
          port: {{ .Values.chatService.service.port }}
    - match: Host(`{{ .Values.ingress.host }}`) && PathPrefix(`{{ .Values.ingress.basePath }}/ws`)
      kind: Rule
      middlewares:
        - name: {{ include "chat-app.fullname" . }}-strip
      services:
        - name: {{ include "chat-app.fullname" . }}-gateway
          port: {{ .Values.gateway.service.port }}
    - match: Host(`{{ .Values.ingress.host }}`) && PathPrefix(`{{ .Values.ingress.basePath }}`)
      kind: Rule
      services:
        - name: {{ include "chat-app.fullname" . }}-frontend
          port: 80
  {{- if .Values.ingress.tls.enabled }}
  tls:
    secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
{{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "chat-app.fullname" . }}-secrets
type: Opaque
stringData:
  db-password: {{ .Values.postgresql.password | quote }}
  jwt-secret: {{ .Values.chatService.env.JWT_SECRET | quote }}
  redis-password: {{ .Values.redis.password | quote }}