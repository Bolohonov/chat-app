replicaCount: 1
registry: "localhost:5000"

frontend:
  image:
    repository: chat-frontend
    tag: latest
    pullPolicy: IfNotPresent

gateway:
  image:
    repository: chat-gateway
    tag: latest
    pullPolicy: IfNotPresent
  service:
    port: 8080
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

chatService:
  image:
    repository: chat-service
    tag: latest
    pullPolicy: IfNotPresent
  service:
    port: 8081
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
