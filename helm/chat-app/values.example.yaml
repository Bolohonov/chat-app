replicaCount: 1

frontend:
  image:
    repository: chat-frontend
    tag: latest
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 20m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi

gateway:
  image:
    repository: chat-gateway
    tag: latest
    pullPolicy: IfNotPresent
  service:
    port: 8080
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

chatService:
  image:
    repository: chat-service
    tag: latest
    pullPolicy: IfNotPresent
  service:
    port: 8081
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  env:
    JWT_EXPIRATION_MS: "86400000"
    JWT_SECRET: "REPLACE_ME"  # минимум 32 символа

postgresql:
  enabled: false
  host: "REPLACE_ME"
  port: 5432
  database: "chatdb"
  username: "chat"
  password: "REPLACE_ME"

redis:
  enabled: false
  host: "REPLACE_ME"
  port: 6379
  password: "REPLACE_ME"

ingress:
  enabled: true
  className: traefik
  host: "REPLACE_ME"          # например chat.local или домен
  tls:
    enabled: false
    secretName: chat-tls