<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" font-family="monospace" font-size="13">
  <rect width="900" height="600" fill="#0f1117"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" fill="#e2e8f0" font-size="18" font-weight="bold">Chat App — Architecture</text>

  <!-- Clients -->
  <g>
    <rect x="20" y="80" width="120" height="50" rx="8" fill="#1e293b" stroke="#38bdf8" stroke-width="1.5"/>
    <text x="80" y="100" text-anchor="middle" fill="#38bdf8" font-size="12">Browser /</text>
    <text x="80" y="116" text-anchor="middle" fill="#38bdf8" font-size="12">Mobile Client</text>
  </g>

  <!-- Ingress -->
  <rect x="200" y="70" width="130" height="70" rx="8" fill="#1e293b" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="265" y="95" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="bold">NGINX Ingress</text>
  <text x="265" y="113" text-anchor="middle" fill="#64748b" font-size="11">/ws → gateway</text>
  <text x="265" y="128" text-anchor="middle" fill="#64748b" font-size="11">/api → java svc</text>

  <!-- Arrows client → ingress -->
  <line x1="140" y1="105" x2="198" y2="105" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Go Gateway -->
  <rect x="400" y="50" width="160" height="100" rx="8" fill="#0c2a1e" stroke="#22c55e" stroke-width="2"/>
  <text x="480" y="80" text-anchor="middle" fill="#22c55e" font-size="13" font-weight="bold">Go Gateway</text>
  <text x="480" y="98" text-anchor="middle" fill="#86efac" font-size="11">WebSocket Hub</text>
  <text x="480" y="114" text-anchor="middle" fill="#86efac" font-size="11">Rooms in-memory</text>
  <text x="480" y="130" text-anchor="middle" fill="#64748b" font-size="11">:8080</text>

  <!-- Java Service -->
  <rect x="400" y="200" width="160" height="110" rx="8" fill="#1a1a2e" stroke="#818cf8" stroke-width="2"/>
  <text x="480" y="230" text-anchor="middle" fill="#818cf8" font-size="13" font-weight="bold">Java / Spring Boot</text>
  <text x="480" y="248" text-anchor="middle" fill="#a5b4fc" font-size="11">Auth (JWT)</text>
  <text x="480" y="264" text-anchor="middle" fill="#a5b4fc" font-size="11">Rooms &amp; Messages REST</text>
  <text x="480" y="280" text-anchor="middle" fill="#a5b4fc" font-size="11">History API</text>
  <text x="480" y="296" text-anchor="middle" fill="#64748b" font-size="11">:8081</text>

  <!-- Ingress → Gateway -->
  <line x1="330" y1="95" x2="398" y2="95" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-green)"/>

  <!-- Ingress → Java -->
  <line x1="330" y1="110" x2="380" y2="250" stroke="#818cf8" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-purple)"/>
  <line x1="380" y1="250" x2="398" y2="250" stroke="#818cf8" stroke-width="1.5" marker-end="url(#arr-purple)"/>

  <!-- PostgreSQL -->
  <rect x="640" y="200" width="130" height="70" rx="8" fill="#1e1a2e" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="705" y="230" text-anchor="middle" fill="#f59e0b" font-size="13" font-weight="bold">PostgreSQL</text>
  <text x="705" y="250" text-anchor="middle" fill="#fcd34d" font-size="11">users, rooms,</text>
  <text x="705" y="266" text-anchor="middle" fill="#fcd34d" font-size="11">messages</text>

  <!-- Redis -->
  <rect x="640" y="310" width="130" height="60" rx="8" fill="#2a1a1a" stroke="#ef4444" stroke-width="1.5"/>
  <text x="705" y="340" text-anchor="middle" fill="#ef4444" font-size="13" font-weight="bold">Redis</text>
  <text x="705" y="358" text-anchor="middle" fill="#fca5a5" font-size="11">Sessions / Cache</text>

  <!-- Java → Postgres -->
  <line x1="562" y1="250" x2="638" y2="250" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arr-yellow)"/>

  <!-- Java → Redis -->
  <line x1="562" y1="280" x2="620" y2="340" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arr-red)"/>
  <line x1="620" y1="340" x2="638" y2="340" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arr-red)"/>

  <!-- Kubernetes boundary -->
  <rect x="185" y="35" width="620" height="380" rx="12" fill="none" stroke="#334155" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="270" y="30" fill="#475569" font-size="11">Kubernetes Cluster (home server Ubuntu)</text>

  <!-- Legend -->
  <text x="30" y="480" fill="#94a3b8" font-size="13" font-weight="bold">Поток данных:</text>
  <line x1="30" y1="500" x2="80" y2="500" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="90" y="505" fill="#64748b" font-size="12">HTTP/WS connect</text>

  <line x1="30" y1="522" x2="80" y2="522" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="90" y="527" fill="#64748b" font-size="12">WebSocket realtime (Go Hub fan-out)</text>

  <line x1="30" y1="544" x2="80" y2="544" stroke="#818cf8" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="90" y="549" fill="#64748b" font-size="12">REST API (auth, history, rooms)</text>

  <!-- Note box -->
  <rect x="480" y="470" width="390" height="110" rx="8" fill="#1e293b" stroke="#334155"/>
  <text x="675" y="492" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="bold">Develop workflow</text>
  <text x="498" y="512" fill="#64748b" font-size="11">1. docker compose up  (local dev)</text>
  <text x="498" y="530" fill="#64748b" font-size="11">2. docker build + push registry</text>
  <text x="498" y="548" fill="#64748b" font-size="11">3. helm upgrade --install chat ./helm/chat-app</text>
  <text x="498" y="566" fill="#64748b" font-size="11">4. kubectl get pods -w</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#22c55e"/>
    </marker>
    <marker id="arr-purple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#818cf8"/>
    </marker>
    <marker id="arr-yellow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f59e0b"/>
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ef4444"/>
    </marker>
  </defs>
</svg>
