version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: chatdb
      POSTGRES_USER: chat
      POSTGRES_PASSWORD: chat
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chat -d chatdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  chat-service:
    build: ../java-service
    ports:
      - "8081:8081"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/chatdb
      DB_USER: chat
      DB_PASSWORD: chat
      REDIS_HOST: redis
      JWT_SECRET: local-dev-secret-min-32-chars-xxxxx
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  chat-gateway:
    build: ../go-gateway
    ports:
      - "8080:8080"
    depends_on:
      - chat-service

  frontend:
    build: ../frontend
    ports:
      - "3000:80"
    depends_on:
      - chat-service
      - chat-gateway

volumes:
  pgdata: